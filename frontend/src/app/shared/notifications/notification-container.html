<section class="notification-container" aria-live="polite" aria-label="Notificaciones">
  @for (notification of notificationService.notifications(); track notification.id) {
    <article
      class="notification notification--{{ notification.type }}"
      [class.notification--closing]="notification.closing"
      [attr.role]="notification.type === 'error' ? 'alert' : 'status'"
    >
      <span class="notification__icon" [attr.aria-label]="iconLabel(notification)">
        @switch (notification.type) {
          @case ('success') { <span aria-hidden="true">✓</span> }
          @case ('error') { <span aria-hidden="true">!</span> }
          @case ('warning') { <span aria-hidden="true">!</span> }
          @case ('info') { <span aria-hidden="true">i</span> }
        }
      </span>

      <div class="notification__content">
        <p class="notification__title">{{ notification.title }}</p>
        <p class="notification__description">{{ notification.description }}</p>
      </div>

      <button
        class="notification__close"
        type="button"
        [attr.aria-label]="'Cerrar notificación: ' + notification.title"
        (click)="dismiss(notification.id)"
      >
        <span aria-hidden="true">×</span>
      </button>
    </article>
  }
</section>
