<main class="forgot-password-page">
  <section class="forgot-password-card" aria-labelledby="forgot-password-title">
    <div class="brand-panel" aria-label="Crearte, buzos de egresados">
      <div class="brand-shape brand-shape--top"></div>
      <div class="brand-content">
        <img
          class="brand-logo"
          src="/crearte-logo.png"
          alt="Crearte, 10 años"
        />
        <p class="brand-tagline">Diseñamos recuerdos para llevar puestos.</p>
      </div>
      <div class="brand-shape brand-shape--bottom"></div>
    </div>

    <div class="form-panel">
      <div class="form-heading">
        <span class="eyebrow">Recuperar acceso</span>
        <h1 id="forgot-password-title">¿Olvidaste tu contraseña?</h1>
        <p>Ingresá tu correo electrónico y te enviaremos las instrucciones para restablecerla.</p>
      </div>

      <form
        class="forgot-password-form"
        (submit)="resetearClave(correo.value); $event.preventDefault()"
      >
        <div class="field-group">
          <label for="correo">Email</label>
          <input
            #correo
            type="email"
            id="correo"
            name="correo"
            autocomplete="email"
            placeholder="nombre@correo.com"
            required
          />
        </div>

        <button class="submit-button" type="submit">
          Enviar instrucciones
        </button>
      </form>

      <a class="back-link" href="/login">Volver a iniciar sesión</a>
    </div>
  </section>
</main>
